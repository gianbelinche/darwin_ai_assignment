services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-expense_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secret}
      POSTGRES_DB: ${POSTGRES_DB:-expenses}
    volumes:
      # init.sql runs automatically on first startup when the data volume is empty
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-expense_user} -d ${POSTGRES_DB:-expenses}"]
      interval: 5s
      timeout: 5s
      retries: 10

  bot-service:
    build:
      context: .
      dockerfile: bot-service/Dockerfile
    env_file: ./bot-service/.env
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy

  connector-service:
    build:
      context: .
      dockerfile: connector-service/Dockerfile
    env_file: ./connector-service/.env
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      bot-service:
        condition: service_started

volumes:
  postgres_data:
